    gap: 8px;
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--fg);
    text-decoration: none;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    background: var(--bg-elev);
    transition: border-color 180ms ease, color 180ms ease, background 180ms ease, transform 180ms ease;

  .link:hover,
  .link:focus-visible {
    color: var(--accent-hi);
    border-color: var(--accent);
    transform: translateY(-1px);

  .link:focus-visible {

  .link.primary {

  .link .lang {

    color: var(--fg-dim);
    border-left: 1px solid var(--border-soft);
    padding-left: 8px;
    margin-left: 2px;

  .link.primary .lang {
    color: color-mix(in oklch, var(--bg) 70%, var(--fg));
